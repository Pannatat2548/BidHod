<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bidmai — กรอก Tracking ทีเดียวหลาย Lot</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
body { background: var(--bg2); }
.page-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
  border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
  color: #fff; position: relative; overflow: hidden;
}
.page-hero::before {
  content: '📦'; position: absolute; right: 24px; top: 50%;
  transform: translateY(-50%); font-size: 64px; opacity: 0.15;
}
.page-hero .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: .75; margin-bottom: 6px; }
.page-hero h1 { font-size: 22px; font-weight: 700; margin: 0; color: #fff; border: none; padding: 0; }
.page-hero .subtitle { font-size: 13px; opacity: .8; margin-top: 4px; }

/* Buyer tabs */
.buyer-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 20px; }
.buyer-tab {
  padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  font-family: inherit; border: 1.5px solid var(--line2);
  background: var(--bg); color: var(--ink3); cursor: pointer; transition: all .18s;
}
.buyer-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Tracking card */
.track-card {
  background: var(--bg); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 22px 24px;
  margin-bottom: 14px; box-shadow: var(--shadow-sm);
}
.track-card-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.buyer-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--primary-light); color: var(--primary);
  font-size: 17px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.buyer-name { font-size: 15px; font-weight: 700; color: var(--ink); }
.buyer-sub { font-size: 11px; color: var(--ink4); margin-top: 2px; }

.lot-list { margin-bottom: 16px; }
.lot-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--line); gap: 10px;
}
.lot-row:last-child { border-bottom: none; }
.lot-num {
  font-size: 11px; font-weight: 700; color: var(--primary);
  background: var(--primary-light); border-radius: 999px; padding: 2px 8px; white-space: nowrap;
}
.lot-name { font-size: 13px; color: var(--ink2); flex: 1; }
.lot-price { font-size: 13px; font-weight: 600; white-space: nowrap; }

.form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.form-row select, .form-row input {
  padding: 10px 14px; font-size: 14px; font-family: inherit;
  border: 1.5px solid var(--line2); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color .2s; flex: 1; min-width: 140px;
}
.form-row select:focus, .form-row input:focus { border-color: var(--primary); }

.btn-deliver {
  width: 100%; padding: 13px; font-size: 14px; font-weight: 700;
  font-family: inherit;
  background: linear-gradient(135deg, var(--primary), #818cf8);
  color: #fff; border: none; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .2s;
  box-shadow: 0 3px 10px rgba(79,70,229,.3); margin-top: 4px;
}
.btn-deliver:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(79,70,229,.4); }
.btn-deliver:disabled { opacity: .55; cursor: default; transform: none; box-shadow: none; }
.btn-deliver.done { background: var(--green); box-shadow: none; }

.msg-inline { font-size: 12px; margin-top: 6px; padding: 8px 12px; border-radius: var(--radius-sm); display: none; }
.msg-inline.ok { color: var(--green); background: var(--green-bg); display: block; }
.msg-inline.err { color: var(--red); background: var(--red-bg); display: block; }

.empty-box {
  text-align: center; padding: 60px 20px; color: var(--ink4);
  background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
}
.skeleton { background: var(--line); border-radius: var(--radius-sm); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.done-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green-bg); color: var(--green);
  border: 1px solid rgba(16,185,129,.25); border-radius: 999px;
  font-size: 12px; font-weight: 700; padding: 4px 12px; margin-left: 10px;
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="/orders.html" style="font-size:12px;color:var(--ink3)">← กลับ Orders</a>
    <div class="logo">Bidmai</div>
  </div>
  <span style="font-size:12px;color:var(--ink3)" id="nav-user"></span>
</nav>

<div class="container-narrow">
  <div class="page-hero">
    <div class="label">Deliver</div>
    <h1>กรอก Tracking ทีเดียวหลาย Lot</h1>
    <div class="subtitle" id="hero-subtitle">กำลังโหลด...</div>
  </div>

  <div id="loading-state">
    <div class="skeleton" style="height:120px;margin-bottom:12px"></div>
    <div class="skeleton" style="height:120px"></div>
  </div>

  <div id="buyer-tabs-wrap" class="buyer-tabs" style="display:none"></div>
  <div id="main-content" style="display:none"></div>
</div>

<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || 'null');
if (!token || !user) location.href = '/login.html?redirect=' + encodeURIComponent(location.href);
if (user) document.getElementById('nav-user').textContent = user.name;

const params = new URLSearchParams(location.search);
const roomId = params.get('room');
if (!roomId) location.href = '/orders.html';

let groups = [];
let currentBuyerIdx = 0;

window.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
  try {
    const r = await fetch(`/api/profile/rooms/${roomId}/pending-delivery`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('โหลดข้อมูลไม่สำเร็จ');
    const data = await r.json();
    groups = data.groups || [];

    // ดึงชื่อห้อง
    const roomRes = await fetch(`/api/rooms/${roomId}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const roomData = roomRes.ok ? await roomRes.json() : {};
    document.getElementById('hero-subtitle').textContent = `ห้อง: ${roomData.title || roomId}`;

    document.getElementById('loading-state').style.display = 'none';

    if (!groups.length) {
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('main-content').innerHTML = `
        <div class="empty-box">
          <div style="font-size:36px;margin-bottom:10px">📭</div>
          <div>ไม่มี lot ที่รอกรอก tracking</div>
          <div style="font-size:12px;color:var(--ink4);margin-top:6px">lot ต้องยืนยันสลิปแล้วและยังไม่ได้ส่ง</div>
        </div>`;
      return;
    }

    renderTabs();
    renderBuyer(0);
    document.getElementById('buyer-tabs-wrap').style.display = groups.length > 1 ? '' : 'none';
    document.getElementById('main-content').style.display = 'block';

  } catch(e) {
    document.getElementById('loading-state').innerHTML = `<div style="color:var(--red);padding:20px">${e.message}</div>`;
  }
}

function renderTabs() {
  const wrap = document.getElementById('buyer-tabs-wrap');
  wrap.innerHTML = groups.map((g, i) => `
    <button class="buyer-tab ${i === 0 ? 'active' : ''}" id="tab-buyer-${i}" onclick="switchBuyer(${i})">
      ${esc(g.buyerName)} (${g.lots.length} lot)
    </button>`).join('');
}

function switchBuyer(idx) {
  currentBuyerIdx = idx;
  document.querySelectorAll('.buyer-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderBuyer(idx);
}

function renderBuyer(idx) {
  const g = groups[idx];
  const wrap = document.getElementById('main-content');
  wrap.innerHTML = `
    <div class="track-card">
      <div class="track-card-head">
        <div class="buyer-avatar">${g.buyerName.charAt(0).toUpperCase()}</div>
        <div>
          <div class="buyer-name">${esc(g.buyerName)}</div>
          <div class="buyer-sub">${g.lots.length} lot รอกรอก Tracking</div>
        </div>
      </div>
      <div class="lot-list">
        ${g.lots.map(l => `
          <div class="lot-row">
            <span class="lot-num">${esc(l.name)}</span>
            <span class="lot-name">${esc(l.desc || l.name)}</span>
            <span class="lot-price">฿${Number(l.currentPrice).toLocaleString()}</span>
          </div>`).join('')}
      </div>
      <div class="form-row">
        <select id="provider-${idx}">
          <option value="">เลือกขนส่ง (ไม่บังคับ)</option>
          <option value="ไปรษณีย์ไทย">ไปรษณีย์ไทย</option>
          <option value="Kerry">Kerry Express</option>
          <option value="Flash">Flash Express</option>
          <option value="J&T">J&T Express</option>
          <option value="Ninja Van">Ninja Van</option>
          <option value="DHL">DHL</option>
        </select>
        <input type="text" id="tracking-${idx}" placeholder="เลข Tracking เช่น TH123456789">
      </div>
      <button class="btn-deliver" id="btn-deliver-${idx}" onclick="submitDeliver(${idx})">
        📦 ยืนยันจัดส่ง ${g.lots.length} lot ให้ ${esc(g.buyerName)}
      </button>
      <div class="msg-inline" id="msg-${idx}"></div>
    </div>`;
}

async function submitDeliver(idx) {
  const g = groups[idx];
  const trackingNumber = document.getElementById(`tracking-${idx}`).value.trim();
  const shippingProvider = document.getElementById(`provider-${idx}`).value;
  const btn = document.getElementById(`btn-deliver-${idx}`);
  const msg = document.getElementById(`msg-${idx}`);

  if (!trackingNumber) { showMsg(idx, 'กรุณากรอกเลข tracking', 'err'); return; }

  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  msg.className = 'msg-inline';

  try {
    const r = await fetch('/api/profile/lots/deliver-merged', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ lotIds: g.lots.map(l => l._id), trackingNumber, shippingProvider })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);

    btn.className = 'btn-deliver done'; btn.textContent = '✅ จัดส่งแล้ว';
    showMsg(idx, `ส่ง ${d.count} lot สำเร็จ — ${shippingProvider ? shippingProvider + ': ' : ''}${trackingNumber}`, 'ok');

    // ตรวจว่า group ทั้งหมดส่งแล้วหรือยัง
    groups[idx]._done = true;
    const allDone = groups.every(g => g._done);
    if (allDone) {
      setTimeout(() => location.href = '/orders.html', 1800);
    } else {
      // ไปหา tab ถัดไปที่ยังไม่ done
      const next = groups.findIndex((g, i) => i !== idx && !g._done);
      if (next !== -1) setTimeout(() => switchBuyer(next), 1500);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = `📦 ยืนยันจัดส่ง ${g.lots.length} lot ให้ ${esc(g.buyerName)}`;
    showMsg(idx, e.message, 'err');
  }
}

function showMsg(idx, text, type) {
  const el = document.getElementById(`msg-${idx}`);
  if (!el) return;
  el.textContent = text; el.className = 'msg-inline ' + type;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
